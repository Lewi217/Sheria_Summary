version: '3.8'

services:
  sheria-summary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheria-summary
    ports:
      - "8079:8079"
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8079/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

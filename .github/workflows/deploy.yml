name: Build and Deploy

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/lewi217/sheria-summary

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,AZURE_OPENAI_API_KEY,AZURE_OPENAI_ENDPOINT,AZURE_OPENAI_CHAT_DEPLOYMENT,AZURE_OPENAI_EMBEDDING_DEPLOYMENT,GHCR_TOKEN,IMAGE_SHA
          script: |
            set -e

            mkdir -p /opt/sheria-summary

            # Write production docker-compose
            cat > /opt/sheria-summary/docker-compose.yml << 'COMPOSE'
            version: '3.8'
            services:
              sheria-summary:
                image: ghcr.io/lewi217/sheria-summary:latest
                container_name: sheria-summary
                ports:
                  - "8079:8079"
                env_file:
                  - .env
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:8079/api/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
            COMPOSE

            # Write .env from GitHub Secrets
            cat > /opt/sheria-summary/.env << EOF
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
            AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
            AZURE_OPENAI_CHAT_DEPLOYMENT=${AZURE_OPENAI_CHAT_DEPLOYMENT}
            AZURE_OPENAI_EMBEDDING_DEPLOYMENT=${AZURE_OPENAI_EMBEDDING_DEPLOYMENT}
            EOF

            # Secure the .env file
            chmod 600 /opt/sheria-summary/.env

            # Login to GHCR and pull new image
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u lewi217 --password-stdin
            docker pull ghcr.io/lewi217/sheria-summary:latest

            # Restart container
            cd /opt/sheria-summary
            docker compose down --remove-orphans
            docker compose up -d

            # Remove dangling images
            docker image prune -f

            echo "Deployed ghcr.io/lewi217/sheria-summary:${IMAGE_SHA}"

spring:
  application:
    name: SheriaSummary

  config:
    import: optional:classpath:keys.properties

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  ai:
    azure:
      openai:
        api-key: ${AZURE_OPENAI_API_KEY}
        endpoint: ${AZURE_OPENAI_ENDPOINT}
        chat:
          options:
            deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT}
            temperature: 0.1
            max-tokens: 2048
        embedding:
          options:
            deployment-name: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT}
            dimensions: 1536

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        index-type: HNSW

spring:
  main:
    web-application-type: servlet

server:
  port: 8079

logging:
  level:
    com.DevLewi.SheriaSummary: INFO
    org.springframework.ai: INFO
